"""
Docker Compose Configuration

Local development environment with PostgreSQL and Redis.
Mimics production setup.
"""

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: piddy_postgres
    environment:
      POSTGRES_DB: piddy_users
      POSTGRES_USER: piddy_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piddy_user -d piddy_users"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piddy_network

  # Redis Cache & Token Blacklist
  redis:
    image: redis:7-alpine
    container_name: piddy_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piddy_network

  # API Service
  api:
    build: .
    container_name: piddy_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://piddy_user:${DATABASE_PASSWORD:-dev_password}@postgres:5432/piddy_users
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_password}@redis:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - piddy_network

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: piddy_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - piddy_network

volumes:
  postgres_data:
  redis_data:

networks:
  piddy_network:
    driver: bridge
