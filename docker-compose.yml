version: '3.8'

services:
  # Core Infrastructure
  postgres:
    image: postgres:16-alpine
    container_name: piddy-postgres
    environment:
      POSTGRES_USER: piddy_user
      POSTGRES_PASSWORD: piddy_password
      POSTGRES_DB: piddy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piddy_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piddy-network

  redis:
    image: redis:7-alpine
    container_name: piddy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piddy-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: piddy-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - piddy-network

  # Phase 1: Foundation
  user-api:
    build:
      context: ./enhanced-api-phase1
      dockerfile: Dockerfile
    container_name: piddy-user-api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://piddy_user:piddy_password@postgres:5432/piddy_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - piddy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Phase 2: Notifications
